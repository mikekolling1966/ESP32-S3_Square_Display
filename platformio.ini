[platformio]
default_envs = waveshare_square
[env:waveshare_square]
platform = espressif32@^6.9.0
board = esp32-s3-devkitc-1
framework = arduino

; Serial monitor and upload settings
monitor_speed = 115200
upload_speed = 115200

; Build flags for Waveshare ESP32-S3-Touch-LCD with CH343 USB chip
build_unflags =
    -std=gnu++11
build_flags = 
    -std=gnu++2a
    -DCORE_DEBUG_LEVEL=0
    -DLOG_LOCAL_LEVEL=0
    -DLV_CONF_INCLUDE_SIMPLE
    -DLV_USE_DRAW_SW_ASM=0
    -DLV_USE_NATIVE_HELIUM_ASM=0
    -DLV_USE_ARM2D=0
    ; CRITICAL: Board has CH343 USB chip, needs USB CDC or HWCDC for serial output
    -DARDUINO_USB_CDC_ON_BOOT=1
    -I include
    -I src
    -DSCREEN_WIDTH=480
    -DSCREEN_HEIGHT=480
    -DLV_HOR_RES_MAX=480
    -DLV_VER_RES_MAX=480
    ; Set data cache line size to 64 bytes for reduced RGB display lag/flicker
    -DCONFIG_ESP32S3_DATA_CACHE_LINE_64B=1
    ; Set PSRAM speed (120MHz OPI)
    -DCONFIG_SPIRAM_SPEED_120M=1
    ; CRITICAL: Restart DMA transmission in VSYNC to prevent permanent desync
    -DCONFIG_LCD_RGB_RESTART_IN_VSYNC=1
    ; Disable WiFi NVS to prevent flash writes blocking PSRAM/display access
    -DCONFIG_ESP_WIFI_NVS_ENABLED=0
    ; Enable PSRAM for malloc/heap allocation
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    ; Redirect malloc() requests >4KB to PSRAM automatically.
    ; Lowers the threshold from 16KB to 4KB so TCP socket buffers (~5760B),
    ; WebSocket buffers (~22KB), and other mid-size allocations all go to
    ; PSRAM instead of consuming internal RAM.
    ; SDMMC/DMA allocations use heap_caps_malloc(MALLOC_CAP_INTERNAL|DMA)
    ; explicitly so they bypass this threshold and are unaffected.
    -DCONFIG_SPIRAM_MALLOC_ALWAYSINTERNAL=4096
    ; NOTE: CONFIG_ESP32_WIFI_STATIC_RX_BUFFER_NUM left at default (10 x 1600B = 16KB).
    ; Reducing to 4 causes RX buffer starvation on chunked HTTP: browser ACK packets
    ; are dropped, triggering TCP retransmission timeouts; cumulative blocks in
    ; sendContent() lock up the CPU mid-stream with no WDT reset.
    ; NOTE: CONFIG_LWIP_TCP_SND_BUF_DEFAULT / TCP_WND_DEFAULT left at default (5744).
    ; Reducing these to 2920 fills the TCP send window on the 2nd config page
    ; load (browser half-open state from prior navigation), causing sendContent()
    ; to block indefinitely — total CPU hang with no WDT reset.
    ; The WiFi RX buffer saving (~9.6KB) is sufficient; TCP window not needed.
    ; Reduce max open sockets from 10 to 6 (HTTP + WS + mDNS = 3 active).
    -DCONFIG_LWIP_MAX_SOCKETS=6
    ; Increase loop() stack to 32KB so handle_gauges_page() (~800 lines of HTML
    ; building) doesn't overflow. Handlers run on Core 1 loop() task (synchronous
    ; WebServer), so the full handler call-depth comes off this stack.
    -DCONFIG_ARDUINO_LOOP_STACK_SIZE=32768
    -DENABLE_RGB_DIAG
    ; Linker wraps to intercept early IDF calls to i2c driver install/delete
    -Wl,--wrap=i2c_driver_install
    -Wl,--wrap=i2c_driver_delete
    -Wl,--wrap=check_i2c_driver_conflict
    ; Repo-root include path for shared version.h
    -I ..

; Inject firmware version + git hash at build time
extra_scripts =
    pre:../inject_version.py
    fix_ota_boot.py

; Memory Configuration - CRITICAL: Board has 8MB OPI PSRAM, must enable it
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = dio  
board_build.psram_type = opi
board_upload.flash_size = 16MB
board_upload.offset_address = 0x100000
#board_build.partitions = partitions.csv
; Use custom partitions that explicitly fit a 16MB flash
board_build.partitions = partitions.csv
board_build.filesystem = spiffs

lib_deps =
    lvgl/lvgl@^8.4.0
    bblanchon/ArduinoJson
    Links2004/WebSockets